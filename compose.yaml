name: flowforms
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports: ["8080:80"]
    depends_on: [api]
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      PORT: 8080
      SSO_MODE: ${SSO_MODE:-dev}
      OIDC_ISSUER: ${OIDC_ISSUER:-http://keycloak:8080/realms/flowforms}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-flowforms-api}
    volumes:
      - flowforms-data:/data
    ports: ["8081:8080"]
  mcp:
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    profiles: ["mcp"]
  postgres:
    image: postgres:16-alpine
    profiles: ["sso"]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-flowforms_dev}
    volumes: ["keycloak-db:/var/lib/postgresql/data"]
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    profiles: ["sso"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-flowforms_dev}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro
    ports: ["8088:8080"]
    depends_on: [postgres]
volumes:
  flowforms-data:
  keycloak-db:
