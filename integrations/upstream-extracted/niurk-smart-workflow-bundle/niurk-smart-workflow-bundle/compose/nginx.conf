server {
  listen 80;
  server_name _;

  location /v1/ {
    proxy_pass http://host.docker.internal:8000/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Niurk-Namespace rhiz/models;
  }

  location /docker-model-runner/ {
    rewrite ^/docker-model-runner/(.*)$ /$1 break;
    proxy_pass http://host.docker.internal:12434/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Niurk-Namespace rhiz/models;
  }

  location /healthz {
    return 200 "niurk-ai-gateway-ok\n";
  }
}
