<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flowforms Playground — Axiom Expression Engine</title>
  <link rel="stylesheet" href="css/flowforms.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script defer src="js/flowforms-glyphs.js"></script>
  <script defer src="js/flowforms-math.js"></script>
  <script defer src="js/flowforms-tensor.js"></script>
  <script defer src="js/flowforms-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><svg viewBox="0 0 64 32"><path d="M8 18C16 2 28 30 32 16C36 2 50 30 58 14" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/><circle cx="32" cy="16" r="3" fill="#111"/></svg><h1>Flowforms Playground</h1></div>
      <nav class="tabs"><button class="active">Draw</button><button>Explore</button><button>Morph</button><button>Animate</button><button>Font</button><button id="formalBtn">Axiom</button></nav>
      <div class="top-actions"><button class="iconbtn">↶</button><button class="iconbtn">↷</button><button class="iconbtn">◴</button><span class="zoom">100%</span><button class="iconbtn">☼</button><button class="iconbtn">☰</button></div>
    </header>
    <section class="workspace">
      <aside class="sidebar"><h2 class="section-title">Glyph Families</h2><div id="families"></div><div class="divider"></div><div class="selectrow"><select><option>Alphabet (All)</option><option>Symbolic</option><option>Generated</option></select></div><input id="glyphSearch" class="search" placeholder="Search glyphs…" style="margin-top:10px"/><div id="glyphGrid" class="glyph-grid"></div><button class="newbtn">＋ New Glyph</button></aside>
      <main class="main">
        <div class="toolbar">
          <button class="tool active">⌖<span>Select</span></button><button class="tool">✎<span>Draw</span></button><button class="tool">⌘<span>Node</span></button><button class="tool">⌒<span>Smooth</span></button><button class="tool">◇<span>Eraser</span></button><button class="tool">✂<span>Scissors</span></button><button class="tool">＋<span>Add Point</span></button><button class="tool">✒<span>Pen</span></button>
        </div>
        <div class="canvas-wrap"><canvas id="glyphCanvas"></canvas><div class="readout">X: 128.42 &nbsp;&nbsp; Y: 256.73<br/>W: 412.11 &nbsp;&nbsp; H: 548.20 &nbsp;⌘</div><div class="float-tools"><button>⌖</button><button>☟</button><button>⌕</button><button>⊕</button><button>⛶</button></div><div id="variants" class="variants"></div><div class="pathbar"><span>∠ 24.2°</span><span class="swatch black"></span><span class="swatch"></span><span>4.0 px⌄</span><span>╭</span><span>╱</span><span>⌁</span><span>…</span></div></div>
        <div class="planches"><div><h2 class="section-title">Glyph Planches</h2><div id="planches" class="strip"></div></div><div><h2 class="section-title">Symbol Sets</h2><div id="symbolsets" class="strip"></div></div></div>
      </main>
      <aside class="inspector"><div class="tabs-small"><button class="active">Parameters</button><button>Advanced</button></div>
        <div class="param"><label>Stroke Width <span>4 px</span></label><input data-param="strokeWidth" type="range" min="1" max="12" value="4"/></div>
        <div class="param"><label>Curvature <span>72%</span></label><input data-param="curvature" type="range" min="0" max="100" value="72"/></div>
        <div class="param"><label>Tension <span>58%</span></label><input data-param="tension" type="range" min="0" max="100" value="58"/></div>
        <div class="param"><label>Rhythm <span>65%</span></label><input data-param="rhythm" type="range" min="0" max="100" value="65"/></div>
        <div class="param"><label>Branching <span>22%</span></label><input data-param="branching" type="range" min="0" max="100" value="22"/></div>
        <div class="param"><label>Axis <span>34%</span></label><input data-param="axis" type="range" min="0" max="100" value="34"/></div>
        <div class="param"><label>Momentum <span>61%</span></label><input data-param="momentum" type="range" min="0" max="100" value="61"/></div>
        <div class="param"><label>Morph Amount <span>38%</span></label><input data-param="morph" type="range" min="0" max="100" value="38"/></div>
        <div class="divider"></div><h2 class="section-title">Display</h2>
        <div class="toggle-row">Grid <span data-toggle="grid" class="toggle on"></span></div><div class="toggle-row">Snap to Grid <span class="toggle on"></span></div><div class="toggle-row">Symmetry (Vertical) <span data-toggle="symmetry" class="toggle on"></span></div><div class="toggle-row">Show Vector Outlines <span data-toggle="outlines" class="toggle on"></span></div><div class="toggle-row">Control Points <span data-toggle="points" class="toggle on"></span></div><div class="toggle-row">Handles <span data-toggle="handles" class="toggle on"></span></div><div class="toggle-row">Animation Preview <span class="toggle"></span></div>
        <div class="divider"></div><h2 class="section-title">Actions</h2><div class="actions"><button id="variantBtn" class="primary">✣ Generate Variants</button><button id="animateBtn">〰 Animate Path</button><button id="saveGlyphBtn">▱ Save Glyph</button><button>◎ Reset View</button><button id="exportSvgBtn">⇧ Export SVG</button><button id="exportFontBtn">A Export Font</button></div>
      </aside>
    </section>
    <footer id="status" class="status"></footer>
  </div>
  <div id="modal" class="modal"><div class="modal-card"><button id="modalClose" class="close">Close</button><h2 id="modalTitle"></h2><pre id="modalBody"></pre></div></div>
</body>
</html>
